<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать сборки | Linux для людей</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="container nav-container">
                <a href="index.html" class="logo">Linux для людей</a>
                <ul class="nav-links">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="download.html">Скачать</a></li>
                    <li><a href="format.html">Форматирование флешки</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Доступные сборки</h1>
            <div id="iso-list" class="iso-grid">
                <p>Загрузка списка...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2025 Linux для людей. Сделано с ❤️ для друзей.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('iso-list');
            if (!container) return;

            fetch('iso.json')
                .then(response => {
                    if (!response.ok) throw new Error('Не удалось загрузить список');
                    return response.json();
                })
                .then(items => {
                    if (items.length === 0) {
                        container.innerHTML = '<p>Пока нет доступных сборок. Загляните позже!</p>';
                        return;
                    }

                    container.innerHTML = '';
                    items.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'iso-card';

                        // Определяем тип и формируем ссылку
                        let linkHtml = '';
                        if (item.type === 'official') {
                            linkHtml = `<a href="${escapeHtml(item.url)}" class="download-link" target="_blank" rel="noopener noreferrer">Скачать с сайта</a>`;
                        } else {
                            linkHtml = `<a href="iso/${encodeURIComponent(item.filename)}" class="download-link" download>Скачать ISO</a>`;
                        }

                        // Бейдж типа
                        const typeBadge = item.type === 'official' 
                            ? '<span class="badge official">Официальный</span>' 
                            : '<span class="badge custom">Кастомный</span>';

                        // Размер и дата (если есть)
                        const metaInfo = item.size ? `<span>📦 ${escapeHtml(item.size)}</span>` : '';
                        const dateInfo = item.date ? `<span>📅 ${escapeHtml(item.date)}</span>` : '';

                        card.innerHTML = `
                            <h3>${escapeHtml(item.name)}</h3>
                            <div class="meta">
                                ${typeBadge}
                                ${metaInfo ? `| ${metaInfo}` : ''}
                                ${dateInfo ? `| ${dateInfo}` : ''}
                            </div>
                            <div class="description">${escapeHtml(item.description)}</div>
                            ${linkHtml}
                        `;
                        container.appendChild(card);
                    });
                })
                .catch(error => {
                    console.error('Ошибка загрузки:', error);
                    container.innerHTML = '<p>Ошибка загрузки списка. Попробуйте обновить страницу позже.</p>';
                });
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
