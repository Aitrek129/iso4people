<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опрос | Linux для людей</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Дополнительные стили для iframe */
        .google-form-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
        }
        .google-form-container iframe {
            width: 100%;
            height: 800px;
            border: none;
            background: transparent;
        }
        @media (max-width: 768px) {
            .google-form-container iframe {
                height: 1000px;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="container nav-container">
                <a href="index.html" class="logo">Linux для людей</a>
                <ul class="nav-links">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="download.html">Скачать</a></li>
                    <li><a href="format.html">Форматирование флешки</a></li>
                    <li><a href="survey.html">Опрос</a></li>
                    <li><button id="theme-switch" class="theme-toggle">🌙 Тёмная</button></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Опрос</h1>
            <p class="survey-intro">Помогите сделать проект лучше. Ваше мнение очень важно!</p>

            <!-- Контейнер для Google Form -->
            <div class="google-form-container">
                <!-- ЗАМЕНИТЕ src="..." НА ВАШ КОД ВСТАВКИ ИЗ GOOGLE FORMS -->
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc9a4R1YKE_hSMKbp6GXvsR7aXxLuH-NdIuxYdAwC3R0FlUTw/viewform?usp=publish-editor" frameborder="0" marginheight="0" marginwidth="0">Загрузка…</iframe>
            </div>

            <!-- Альтернативная ссылка (если iframe не грузится) -->
            <div class="export-section">
                <p>Если форма не отображается, <a href="https://docs.google.com/forms/d/e/ВАШ_ИДЕНТИФИКАТОР/viewform" target="_blank" rel="noopener noreferrer">откройте её в новой вкладке</a>.</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2025 Linux для людей. Сделано с ❤️ для друзей.</p>
        </div>
    </footer>

    <script src="theme.js"></script>
</body>
</html>
